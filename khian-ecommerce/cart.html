<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YKB CLOTHING</title> 
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" />

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="cart.css">

</head>
<body>

    <section id="header">

        <a href="#">
            <img src= "images/banner/b1.png" class="logo" alt="YKB Clothing">
        </a>

        <div>
            <ul id="navbar">
                <li><a href="index.html">Home</a></li>
                <li><a href="shop.html">Shop</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li class="wishlist-icon">
                    <a href="wishlist.html">
                        <i class="fas fa-heart"></i>
                        <span id="wishlist-count">0</span>
                    </a>
                </li>
                <li id="lg-bag">
                    <a class="active" href="cart.html" style="position: relative;">
                        <i class="fas fa-shopping-bag"></i>
                    
                        <!-- CART BADGE -->
                        <span id="cart-count">0</span>
                    </a>
                </li>
                <a href="#" id="close"><i class="far fa-times"></i></a>

                <button id="dark-mode-btn">
                    <i class="fas fa-moon"></i>
                </button>
                
            </ul>
        </div>
        <div id="mobile">
            <a href="cart.html"><i class="fas fa-shopping-bag" aria-hidden="true"></i></a>
            <i id="bar" class="fas fa-outdent"></i>
        </div>
    </section>

    <section id="page-header" class="cart-header">
    <h2>#My_Cart</h2>
    <p>Add your coupon code & SAVE up to 70%!</p>
    </section>

    <section id="cart" class="section-p1">

    <table width="100%">
        <thead>
            <tr>
                <th>Remove</th>
                <th>Image</th>
                <th>Product</th>
                <th>Size</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
            </tr>
        </thead>

        <tbody id="cart-items"></tbody>

    </table>

    <div id="empty-cart-image">
    <i class="fas fa-shopping-cart"></i>
    <h3>Your cart is empty</h3>
    <a href="shop.html" class="normal">
        Continue Shopping
    </a>
</div>

    </section>

    <section id="cart-add" class="section-p1">

    <div id="coupon">
        <h3>Apply Coupon</h3>
        <div>
            <input type="text" placeholder="Enter Your Coupon">
            <button class="normal">Apply</button>
        </div>
    </div>

    <div id="subtotal">
    <h3>Cart Totals</h3>

    <table>
        <tr>
            <td>Cart Subtotal</td>
            <td>₱599</td>
        </tr>
        <tr>
            <td>Shipping</td>
            <td>Free</td>
        </tr>
        <tr>
            <td><strong>Total</strong></td>
            <td><strong>₱599</strong></td>
        </tr>
    </table>

    

    <button class="checkout-btn" onclick="validateCheckout()">
    <i class="fas fa-lock"></i>
    Proceed to Secure Checkout
</button>
</div>

    <!-- ✅ PAYMENT METHOD (CORRECT PLACE) -->
    <div id="payment-method">
        <h3>Payment Method</h3>

        <label>
            <input type="radio" name="payment" checked>
            Cash on Delivery (COD)
        </label>

        <label>
            <input type="radio" name="payment">
            GCash
        </label>

        <label>
            <input type="radio" name="payment">
            PayPal
        </label>
    </div>

</section>



    <script src="script.js"></script>   
    <script src="cart.js"></script>
    <script src="darkmode.js"></script>
</body>
</html>
