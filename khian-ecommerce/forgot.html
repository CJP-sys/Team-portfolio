<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link rel="stylesheet" href="forgot.css">

</head>


<body>


<section>


<div class="forgot-box">


<div class="logo">

<ion-icon name="cart-outline"></ion-icon>

</div>



<h2>Reset Password</h2>


<p class="subtitle">
Enter your email and new password
</p>




<form id="forgotForm" autocomplete="off">





<div class="input-box">


<span class="icon">

<ion-icon name="mail-outline"></ion-icon>

</span>



<input
id="email"
type="email"
placeholder=" "
autocomplete="off"
required>


<label>Email</label>


</div>







<div class="input-box">


<span class="icon">

<ion-icon name="lock-closed-outline"></ion-icon>

</span>




<input
id="newPassword"
type="password"
placeholder=" "
autocomplete="new-password"
required>



<label>New Password</label>



</div>







<button type="submit">

Reset Password

</button>


<div class="back-link">

<a href="login.html">

Back to Login

</a>

</div>


</form>

</div>


</section>


<script type="module"
src="https://unpkg.com/ionicons@7.2.1/dist/ionicons/ionicons.esm.js">
</script>


<script src="forgot.js"></script>


</body>

</html>
